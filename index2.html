<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mortgage Calculator</title>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f7fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        width: 360px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 12px;
        font-weight: 500;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 15px;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #1e4ed8;
    }

    .result {
        margin-top: 20px;
        padding: 15px;
        background: #f1f5f9;
        border-radius: 10px;
        text-align: center;
        font-size: 14px;
    }

    .result span {
        font-size: 22px;
        font-weight: bold;
        display: block;
        margin-top: 5px;
    }
</style>
</head>

<body>

<div class="card">
    <h2>Mortgage Calculator</h2>

    <label>Loan Amount ($)</label>
    <input type="number" id="loan" value="100000" />

    <label>Interest Rate (%)</label>
    <input type="number" id="rate" value="6" step="0.01" />

    <label>Loan Term (Years)</label>
    <input type="number" id="years" value="30" />

    <label>Loan Type</label>
    <select id="type">
        <option value="pi">Principal & Interest</option>
        <option value="io">Interest Only</option>
    </select>

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result">
        Monthly Payment:
        <span>$0.00</span>
    </div>
</div>

<script>
function calculate() {
    const P = parseFloat(document.getElementById("loan").value);
    const annualRate = parseFloat(document.getElementById("rate").value) / 100;
    const years = parseFloat(document.getElementById("years").value);
    const type = document.getElementById("type").value;

    if (!P || !annualRate || !years) {
        document.getElementById("result").innerHTML =
            "Please enter valid values.";
        return;
    }

    const monthlyRate = annualRate / 12;

    let payment;
    let label;

    if (type === "io") {
        // Interest Only: principal is NOT paid down
        payment = P * monthlyRate;
        label = "Interest-Only Payment";
    } else {
        // Standard amortized mortgage
        const n = years * 12;
        payment = (P * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -n));
        label = "Principal & Interest Payment";
    }

    document.getElementById("result").innerHTML = `
        ${label}:<span>$${payment.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        })}</span>
    `;
}
</script>

</body>
</html>
