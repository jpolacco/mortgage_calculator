<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mortgage Payment Calculator</title>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f7fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        width: 350px;
    }

    h2 {
        margin-bottom: 20px;
        text-align: center;
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: 500;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 16px;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #1e4ed8;
    }

    .result {
        margin-top: 20px;
        padding: 15px;
        background: #f1f5f9;
        border-radius: 10px;
        text-align: center;
    }

    .result span {
        font-size: 22px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="card">
    <h2>Mortgage Calculator</h2>

    <label>Loan Amount ($)</label>
    <input type="number" id="loan" value="100000" />

    <label>Interest Rate (%)</label>
    <input type="number" id="rate" value="6" step="0.01" />

    <label>Loan Term (Years)</label>
    <input type="number" id="years" value="30" />

    <button onclick="calculate()">Calculate Payment</button>

    <div class="result" id="result">
        Monthly Payment: <br />
        <span>$0.00</span>
    </div>
</div>

<script>
function calculate() {
    const P = parseFloat(document.getElementById("loan").value);
    const annualRate = parseFloat(document.getElementById("rate").value) / 100;
    const years = parseFloat(document.getElementById("years").value);

    if (!P || !annualRate || !years) {
        document.getElementById("result").innerHTML = "Please enter valid values.";
        return;
    }

    const r = annualRate / 12;
    const n = years * 12;

    const payment = (P * r) / (1 - Math.pow(1 + r, -n));

    document.getElementById("result").innerHTML = `
        Monthly Payment:<br>
        <span>$${payment.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
    `;
}
</script>

</body>
</html>
